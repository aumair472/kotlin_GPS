<script>
        function selectLanguage(element) {
            // Remove active states from all cards
            document.querySelectorAll('.language-card').forEach(card => {
                card.classList.remove('bg-[#EFF6FF]', 'border-[#2563EB]');
                card.classList.add('bg-white', 'border-outline-variant');
                
                // Reset radio circles
                const circle = card.querySelector('.radio-circle');
                circle.innerHTML = '';
                circle.classList.remove('bg-[#2563EB]', 'border-[#2563EB]');
                circle.classList.add('border-outline-variant', 'bg-transparent');
            });

            // Set active state to clicked card
            element.classList.remove('bg-white', 'border-outline-variant');
            element.classList.add('bg-[#EFF6FF]', 'border-[#2563EB]');
            
            // Update radio circle UI
            const circle = element.querySelector('.radio-circle');
            circle.classList.remove('border-outline-variant', 'bg-transparent');
            circle.classList.add('bg-[#2563EB]', 'border-[#2563EB]');
            circle.innerHTML = '<div class="w-2.5 h-2.5 bg-white rounded-full"></div>';
        }
    </script>
