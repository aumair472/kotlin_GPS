<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GeoSnap - New Report</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;family=Geist:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        /* Precision Minimalism: Hide scrollbars but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#004ac6",
                        "on-primary": "#ffffff",
                        "primary-container": "#2563eb",
                        "on-primary-container": "#eeefff",
                        "surface": "#faf8ff",
                        "on-surface": "#191b23",
                        "on-surface-variant": "#434655",
                        "outline": "#737686",
                        "outline-variant": "#c3c6d7",
                        "surface-container-low": "#f3f3fe",
                        "surface-container-high": "#e7e7f3",
                        "background": "#faf8ff",
                        "error": "#ba1a1a",
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "space-md": "16px",
                        "space-xl": "40px",
                        "space-xs": "4px",
                        "space-lg": "24px",
                        "space-sm": "8px",
                        "margin-mobile": "16px",
                    },
                    "fontFamily": {
                        "body-sm": ["Hanken Grotesk"],
                        "headline-md": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"],
                        "mono-data": ["Geist"],
                        "label-caps": ["Hanken Grotesk"],
                        "body-lg": ["Hanken Grotesk"],
                    },
                    "fontSize": {
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-white text-on-surface font-body-lg antialiased">
<!-- TopAppBar -->
<header class="bg-surface sticky top-0 z-50 flex justify-between items-center w-full px-margin-mobile py-space-sm h-14 border-b border-outline-variant">
<button class="active:opacity-80 transition-opacity flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-on-surface">New Report</h1>
<button class="text-primary font-label-caps hover:bg-surface-container-low px-2 py-1 rounded transition-colors">
            Save Draft
        </button>
</header>
<main class="px-margin-mobile pb-32">
<!-- Report Title Section -->
<section class="mt-6">
<label class="block text-[13px] font-semibold text-on-surface mb-2">Report Title</label>
<input class="w-full border-[#E0E0E0] border-[0.5px] rounded-[10px] px-4 py-3 text-[15px] placeholder-[#9CA3AF] focus:ring-1 focus:ring-primary focus:border-primary transition-all outline-none" placeholder="e.g. Site Inspection Block 5" type="text"/>
</section>
<!-- Location Field -->
<section class="mt-4">
<label class="block text-[13px] font-semibold text-on-surface mb-2">Location</label>
<div class="flex items-center bg-[#F3F4F6] rounded-[10px] px-4 py-3">
<span class="material-symbols-outlined text-primary mr-3" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
<span class="text-[14px] text-on-surface flex-grow">Karachi, Sindh, Pakistan</span>
<button class="active:rotate-180 transition-transform duration-500">
<span class="material-symbols-outlined text-primary" data-icon="refresh">refresh</span>
</button>
</div>
</section>
<!-- Date/Time Row -->
<section class="mt-4 flex gap-4">
<div class="flex-1">
<label class="block text-[13px] font-semibold text-on-surface mb-2">Date</label>
<div class="flex items-center bg-[#F3F4F6] rounded-[10px] px-4 py-3">
<span class="text-[14px] text-on-surface flex-grow">21 Nov 2024</span>
<span class="material-symbols-outlined text-on-surface-variant text-[20px]" data-icon="calendar_today">calendar_today</span>
</div>
</div>
<div class="flex-1">
<label class="block text-[13px] font-semibold text-on-surface mb-2">Time</label>
<div class="flex items-center bg-[#F3F4F6] rounded-[10px] px-4 py-3">
<span class="text-[14px] text-on-surface flex-grow">14:32 PKT</span>
<span class="material-symbols-outlined text-on-surface-variant text-[20px]" data-icon="schedule">schedule</span>
</div>
</div>
</section>
<!-- Notes / Description -->
<section class="mt-4">
<label class="block text-[13px] font-semibold text-on-surface mb-2">Notes / Description</label>
<textarea class="w-full border-[#E0E0E0] border-[0.5px] rounded-[10px] px-4 py-3 text-[14px] placeholder-[#9CA3AF] focus:ring-1 focus:ring-primary focus:border-primary transition-all outline-none resize-none bg-white" placeholder="Add site notes, observations or remarks..." rows="4"></textarea>
</section>
<!-- Attached Photos -->
<section class="mt-4">
<div class="flex justify-between items-center mb-2">
<label class="text-[13px] font-semibold text-on-surface">Attached Photos</label>
<button class="text-primary text-[13px] font-semibold active:opacity-70">See All (8)</button>
</div>
<div class="flex gap-3 overflow-x-auto no-scrollbar py-1">
<!-- Add Photo Box -->
<button class="flex-shrink-0 w-[72px] h-[72px] rounded-lg border-2 border-dashed border-primary bg-[#EEF2FF] flex items-center justify-center active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary" data-icon="add">add</span>
</button>
<!-- Thumbnails -->
<div class="relative flex-shrink-0 w-[72px] h-[72px] rounded-lg bg-[#374151] overflow-hidden group">
<img class="w-full h-full object-cover opacity-80" data-alt="A professional close-up architectural photo showing a concrete structure under inspection. The lighting is bright and clear, emphasizing the flat, minimalist aesthetic of the documentation tool. The overall tone is clinical and precise, with sharp lines and high contrast." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC9XGUIQJ-BhFHlbwG8IfCCQHI2FS0KJYHkWqSswCWOdla5-7yx80U2NNOceB-rs4S8OUaa9VzRA95_wtsz92WUGKrtPTafkmpe08N3uIiH86Ezr5A1mP_APMmbXLMZ6qwXbjHRIhXymwSIT-u2ytQYZip5BxWM0JMT_CxIFetO_Pm-_m3fceleQKRmt8stvZA5E7h-3n_KkVqsBKRyCCgkxKykP6yQni_L62oB8V_NKKIJxp2VexuF5g"/>
<div class="absolute bottom-1 left-1">
<span class="material-symbols-outlined text-white text-[16px]" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
</div>
<div class="relative flex-shrink-0 w-[72px] h-[72px] rounded-lg bg-[#374151] overflow-hidden group">
<img class="w-full h-full object-cover opacity-80" data-alt="A high-angle professional photograph of an industrial site featuring heavy machinery and construction materials. The scene is bathed in natural daylight, creating a clean and realistic look for a field report. The image follows a precision minimalist style with balanced composition and neutral colors." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCcS98BOo3R-Z0mXfbNqIoEYiS5sY2rCPap_rtzQO-KyqIPoFB49a7NetwYcOEoH6yF2Q1ezSVDiioT20-sj4LIqFEAQ3ykFUerdpc32y_pTmiVe7KIjVa4xW3wm08VqRyJrjJMVWty-nHPbRCFwdnVCJ084UH817rvYgki4hzNQZ8FK8Rj_HLEl7FdnPhB1vi283gCwdfaj1lBSYWtVJYiZQAK0sdyDzpge5N812-0pVGYC8ZiZR_7xQ"/>
<div class="absolute bottom-1 left-1">
<span class="material-symbols-outlined text-white text-[16px]" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
</div>
<div class="relative flex-shrink-0 w-[72px] h-[72px] rounded-lg bg-[#374151] overflow-hidden group">
<img class="w-full h-full object-cover opacity-80" data-alt="A detailed wide shot of an urban development area viewed from a surveyor's perspective. The lighting is soft and even, highlighting textures of steel and glass. The visual style is focused on clarity and documentation, avoiding artistic filters to maintain a professional, flat UI aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuClw7zM3wfDIorKKBXll6ClbfBtDP8pK-7YwBPTbE417z39Z4RYGqOb8kVsqzEqqhhB1Dqo8HUjeqCtmMLXvTemXzEUVE22TIRBysr6i_XV2TDj2NoTmGSZcTAIwedW9h9S4IVK6w5joqglaNtAY38Gofqp_-rmsO6arctufWInvsckZtR0tauud0aW7Vb8M-pvzO-web-naded7BHHPs-XLQdl5NwXOAqMIeOyMi5j8vDmhm24Ymk6-A"/>
<div class="absolute bottom-1 left-1">
<span class="material-symbols-outlined text-white text-[16px]" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
</div>
</div>
</section>
<!-- GPS Summary Card -->
<section class="mt-4 bg-[#F3F4F6] rounded-[10px] p-4 border border-transparent">
<div class="flex justify-between items-center mb-4">
<div class="flex items-center">
<span class="material-symbols-outlined text-primary mr-2" data-icon="gps_fixed">gps_fixed</span>
<span class="text-[14px] font-bold text-on-surface">GPS Data</span>
</div>
<div class="flex items-center bg-white px-2 py-0.5 rounded-full border border-outline-variant">
<span class="w-2 h-2 rounded-full bg-green-500 mr-2"></span>
<span class="text-[11px] font-bold text-green-700">LIVE</span>
</div>
</div>
<div class="space-y-3">
<div class="flex justify-between items-center border-b border-[#E5E7EB] pb-2">
<span class="text-[12px] text-on-surface-variant font-medium">Latitude</span>
<span class="text-[13px] font-mono-data font-medium text-on-surface">24.8607° N</span>
</div>
<div class="flex justify-between items-center border-b border-[#E5E7EB] pb-2">
<span class="text-[12px] text-on-surface-variant font-medium">Longitude</span>
<span class="text-[13px] font-mono-data font-medium text-on-surface">67.0104° E</span>
</div>
<div class="flex justify-between items-center border-b border-[#E5E7EB] pb-2">
<span class="text-[12px] text-on-surface-variant font-medium">Altitude</span>
<span class="text-[13px] font-mono-data font-medium text-on-surface">342 m</span>
</div>
<div class="flex justify-between items-center">
<span class="text-[12px] text-on-surface-variant font-medium">Accuracy</span>
<span class="text-[13px] font-mono-data font-medium text-on-surface">±3 m</span>
</div>
</div>
</section>
</main>
<!-- Footer / CTA -->
<footer class="fixed bottom-0 left-0 w-full bg-white px-margin-mobile pt-4 pb-8 border-t border-outline-variant">
<button class="w-full h-[52px] bg-primary-container text-white font-bold rounded-lg active:scale-[0.98] transition-transform flex items-center justify-center">
            Submit Report
        </button>
<p class="text-center text-[12px] text-on-surface-variant mt-2">
            Report will be saved with GPS verification
        </p>
</footer>
<!-- BottomNavBar (Hidden on this transactional screen as per Shell Visibility & Relevance rule) -->
<!-- The prompt describes a focused task (New Report), so the BottomNavBar from JSON is suppressed for prioritizing the content canvas. -->
<script>
        // Micro-interaction for refresh icon
        document.querySelector('[data-icon="refresh"]').parentElement.addEventListener('click', function() {
            this.classList.add('animate-spin');
            setTimeout(() => {
                this.classList.remove('animate-spin');
            }, 1000);
        });

        // Simple validation visualization
        const inputs = document.querySelectorAll('input, textarea');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('ring-1', 'ring-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('ring-1', 'ring-primary');
            });
        });
    </script>
</body></html>
