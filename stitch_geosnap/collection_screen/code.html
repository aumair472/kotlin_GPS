<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GeoSnap - Collection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Geist:wght@400;500&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@100..900&display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1;
        }
        /* Custom scrollbar hiding for horizontal chips */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Grid spacing custom value from requirement */
        .grid-gap-2dp {
            gap: 2px;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-container": "#5e6572",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "on-surface": "#191b23",
                        "secondary-container": "#dce2f3",
                        "on-surface-variant": "#434655",
                        "surface-container-low": "#f3f3fe",
                        "on-secondary-fixed-variant": "#404754",
                        "error": "#ba1a1a",
                        "surface-container-error": "#ffdad6",
                        "on-secondary": "#ffffff",
                        "on-tertiary-container": "#ffede6",
                        "on-primary-container": "#eeefff",
                        "surface-bright": "#faf8ff",
                        "surface-variant": "#e1e2ed",
                        "secondary-fixed-dim": "#c0c7d6",
                        "inverse-surface": "#2e3039",
                        "on-error": "#ffffff",
                        "surface": "#faf8ff",
                        "tertiary-fixed-dim": "#ffb596",
                        "primary-fixed-dim": "#b4c5ff",
                        "on-primary-fixed": "#00174b",
                        "background": "#faf8ff",
                        "surface-container": "#ededf9",
                        "secondary-fixed": "#dce2f3",
                        "primary-fixed": "#dbe1ff",
                        "on-tertiary": "#ffffff",
                        "on-primary": "#ffffff",
                        "surface-tint": "#0053db",
                        "secondary": "#585f6c",
                        "tertiary-fixed": "#ffdbcd",
                        "on-background": "#191b23",
                        "primary-container": "#2563eb",
                        "tertiary": "#943700",
                        "surface-container-high": "#e7e7f3",
                        "primary": "#004ac6",
                        "on-secondary-fixed": "#151c27",
                        "outline": "#737686",
                        "tertiary-container": "#bc4800",
                        "on-error-container": "#93000a",
                        "inverse-primary": "#b4c5ff",
                        "surface-dim": "#d9d9e5",
                        "surface-container-highest": "#e1e2ed",
                        "outline-variant": "#c3c6d7"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "space-sm": "8px",
                        "space-lg": "24px",
                        "space-xl": "40px",
                        "space-md": "16px",
                        "margin-desktop": "32px",
                        "container-max-width": "1200px",
                        "margin-mobile": "16px",
                        "gutter": "16px",
                        "space-xs": "4px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Hanken Grotesk"],
                        "body-sm": ["Hanken Grotesk"],
                        "headline-md": ["Hanken Grotesk"],
                        "label-caps": ["Hanken Grotesk"],
                        "mono-data": ["Geist"],
                        "headline-lg": ["Hanken Grotesk"],
                        "body-lg": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "mono-data": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                        "headline-lg": ["30px", {"lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#FFFFFF] text-on-surface font-body-sm selection:bg-primary-container selection:text-on-primary-container">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 bg-white border-b border-outline-variant flex justify-between items-center px-margin-mobile h-14">
<button class="flex items-center justify-center w-10 h-10 -ml-2 text-[#1A1A2E]">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-[18px] font-bold text-on-surface">Collection</h1>
<button class="flex items-center justify-center w-10 h-10 -mr-2 text-[#2563EB]">
<span class="material-symbols-outlined" data-icon="filter_list">filter_list</span>
</button>
</header>
<main class="pt-14 pb-20">
<!-- Search Bar Section -->
<div class="px-margin-mobile mt-space-md">
<div class="relative flex items-center bg-[#F3F4F6] rounded-xl px-4 py-3">
<span class="material-symbols-outlined text-outline mr-3" data-icon="search">search</span>
<input class="bg-transparent border-none p-0 flex-grow focus:ring-0 text-on-surface-variant font-body-sm placeholder:text-outline" placeholder="Search by location, date..." type="text"/>
<span class="material-symbols-outlined text-outline ml-3" data-icon="mic">mic</span>
</div>
</div>
<!-- Filter Chips Section -->
<div class="mt-space-md">
<div class="flex overflow-x-auto no-scrollbar px-margin-mobile gap-space-sm pb-2">
<!-- Active Chip -->
<button class="whitespace-nowrap px-4 py-2 bg-[#2563EB] text-white rounded-full font-label-caps flex items-center justify-center h-9">
                    All
                </button>
<!-- Inactive Chips -->
<button class="whitespace-nowrap px-4 py-2 bg-[#F3F4F6] text-on-surface-variant rounded-full font-label-caps flex items-center justify-center h-9">
                    Today
                </button>
<button class="whitespace-nowrap px-4 py-2 bg-[#F3F4F6] text-on-surface-variant rounded-full font-label-caps flex items-center justify-center h-9">
                    This Week
                </button>
<button class="whitespace-nowrap px-4 py-2 bg-[#F3F4F6] text-on-surface-variant rounded-full font-label-caps flex items-center justify-center h-9">
                    Videos
                </button>
<button class="whitespace-nowrap px-4 py-2 bg-[#F3F4F6] text-on-surface-variant rounded-full font-label-caps flex items-center justify-center h-9">
                    Photos
                </button>
</div>
</div>
<!-- Content Grid Section: Today -->
<section class="mt-space-lg">
<h2 class="px-margin-mobile text-[12px] font-semibold text-[#6B7280] mb-space-sm">Today — 21 Nov 2024</h2>
<div class="grid grid-cols-3 grid-gap-2dp">
<!-- Item 1 (Video) -->
<div class="relative aspect-square bg-surface-variant overflow-hidden group">
<img alt="" class="w-full h-full object-cover" data-alt="A professional high-definition video frame showing a surveyor using a GPS device in Karachi, Pakistan. The scene is bright with natural daylight and the background features clean modern architecture. The image is crisp and clear, following a professional documentary photography style with no shadows or filters, keeping the white and blue aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD0ml6rt_56vkJJUT8UaH68LhneAhUyxOW8iCskQb42tyOE1ZYCEzrxzhOaggXMm_tTtQ2_IAMvXpfzJtHHdl0rfK8y50S4zPm_nA0c6-2X-wF3pSA-IAFAHf2PhzeYOx6w5cqdG34RJ7-NU_MLUlSsCxf4PtsbqyK2HdK95wD1aav6MDI2mSqL6L124Sj8bhZYdKTayExfJrfhvtnJ1zaW4tg2hAxm3_01WCsTOPsN1mIUFTEDiz6jnA"/>
<div class="absolute top-2 left-2 bg-[#2563EB] text-white p-1 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-[16px] fill-icon" data-icon="play_arrow" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</div>
<div class="absolute bottom-0 w-full bg-black/40 py-1 px-2 flex items-center gap-1">
<span class="material-symbols-outlined text-white text-[10px]" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
<span class="text-white text-[10px] font-mono-data truncate">Karachi, PK</span>
</div>
</div>
<!-- Repeat Items for Grid -->
<!-- Item 2-9 -->
<script>
                    const todayImages = [
                        "https://images.unsplash.com/photo-1521747116042-5a810fda9664?auto=format&fit=crop&q=80&w=400",
                        "https://images.unsplash.com/photo-1449824913935-59a10b8d2000?auto=format&fit=crop&q=80&w=400",
                        "https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?auto=format&fit=crop&q=80&w=400",
                        "https://images.unsplash.com/photo-1514565131-fce0801e5785?auto=format&fit=crop&q=80&w=400",
                        "https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?auto=format&fit=crop&q=80&w=400",
                        "https://images.unsplash.com/photo-1519501025264-65ba15a82390?auto=format&fit=crop&q=80&w=400",
                        "https://images.unsplash.com/photo-1520250497591-112f2f40a3f4?auto=format&fit=crop&q=80&w=400",
                        "https://images.unsplash.com/photo-1496568844534-17781f08e010?auto=format&fit=crop&q=80&w=400"
                    ];
                    todayImages.forEach((src, idx) => {
                        document.write(`
                            <div class="relative aspect-square bg-surface-variant overflow-hidden group">
                                <img src="${src}" alt="" class="w-full h-full object-cover" data-alt="A detailed wide shot of urban landscapes and structural surveying in Karachi, Pakistan. The photography is clean, bright, and maintains a minimal professional aesthetic for a documentation app. The lighting is neutral midday sun, highlighting architectural precision and geolocation data context. Each image is high quality and professional.">
                                <div class="absolute bottom-0 w-full bg-black/40 py-1 px-2 flex items-center gap-1">
                                    <span class="material-symbols-outlined text-white text-[10px]" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
                                    <span class="text-white text-[10px] font-mono-data truncate">Karachi, PK</span>
                                </div>
                            </div>
                        `);
                    });
                </script>
</div>
</section>
<!-- Content Grid Section: Yesterday -->
<section class="mt-space-lg">
<h2 class="px-margin-mobile text-[12px] font-semibold text-[#6B7280] mb-space-sm">Yesterday — 20 Nov 2024</h2>
<div class="grid grid-cols-3 grid-gap-2dp">
<script>
                    const yesterdayImages = [
                        "https://images.unsplash.com/photo-1518391846015-55a9cc003b25?auto=format&fit=crop&q=80&w=400",
                        "https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&q=80&w=400",
                        "https://images.unsplash.com/photo-1493397862567-47fea33b127a?auto=format&fit=crop&q=80&w=400",
                        "https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?auto=format&fit=crop&q=80&w=400",
                        "https://images.unsplash.com/photo-1483728642387-6c3bdd6c93e5?auto=format&fit=crop&q=80&w=400",
                        "https://images.unsplash.com/photo-1503423571797-2d2bb372094a?auto=format&fit=crop&q=80&w=400"
                    ];
                    yesterdayImages.forEach((src) => {
                        document.write(`
                            <div class="relative aspect-square bg-surface-variant overflow-hidden group">
                                <img src="${src}" alt="" class="w-full h-full object-cover" data-alt="A professional capture of engineering project sites and metropolitan infrastructure in Karachi. The images are taken with a professional GPS camera, showing clear details in a flat, high-contrast light-mode style. The overall mood is systematic and efficient, highlighting modern field work documentation.">
                                <div class="absolute bottom-0 w-full bg-black/40 py-1 px-2 flex items-center gap-1">
                                    <span class="material-symbols-outlined text-white text-[10px]" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
                                    <span class="text-white text-[10px] font-mono-data truncate">Karachi, PK</span>
                                </div>
                            </div>
                        `);
                    });
                </script>
</div>
</section>
</main>
<!-- Bottom Navigation Bar -->
<!-- Managed by Shared Component Logic: BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-xl bg-surface-container-lowest border-t border-outline-variant flex justify-around items-center h-16 px-gutter pb-safe">
<!-- Photo (Camera) -->
<button class="flex flex-col items-center justify-center text-on-secondary-container active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined" data-icon="photo_camera">photo_camera</span>
<span class="font-label-caps text-label-caps mt-1">Photo</span>
</button>
<!-- Video -->
<button class="flex flex-col items-center justify-center text-on-secondary-container active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined" data-icon="videocam">videocam</span>
<span class="font-label-caps text-label-caps mt-1">Video</span>
</button>
<!-- Collection (Active) -->
<div class="flex flex-col items-center justify-center relative active:scale-95 transition-transform duration-150">
<div class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-4 py-1">
<span class="material-symbols-outlined fill-icon" data-icon="library_books" style="font-variation-settings: 'FILL' 1;">library_books</span>
<span class="font-label-caps text-label-caps">Collection</span>
</div>
<!-- Active Indicator Dot (Custom requirement) -->
<div class="w-1 h-1 bg-[#2563EB] rounded-full absolute -bottom-2"></div>
</div>
<!-- Reporting (Templates) -->
<button class="flex flex-col items-center justify-center text-on-secondary-container active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined" data-icon="assignment_turned_in">assignment_turned_in</span>
<span class="font-label-caps text-label-caps mt-1">Reporting</span>
</button>
</nav>
<script>
        // Simple Interaction for chips
        document.querySelectorAll('button.whitespace-nowrap').forEach(chip => {
            chip.addEventListener('click', function() {
                document.querySelectorAll('button.whitespace-nowrap').forEach(c => {
                    c.classList.remove('bg-[#2563EB]', 'text-white');
                    c.classList.add('bg-[#F3F4F6]', 'text-on-surface-variant');
                });
                this.classList.remove('bg-[#F3F4F6]', 'text-on-surface-variant');
                this.classList.add('bg-[#2563EB]', 'text-white');
            });
        });
    </script>
</body></html>
