<body class="bg-white text-on-background min-h-screen">
<!-- Top App Bar - Using TopAppBar Anchor for reference -->
<header class="fixed top-0 w-full bg-white z-50 flex items-center justify-between px-margin-mobile h-14">
<div class="flex items-center gap-4">
<button aria-label="Go back" class="flex items-center justify-center w-11 h-11 transition-colors hover:bg-surface-container">
<span class="material-symbols-outlined text-[#1A1A2E]" style="font-size: 24px;">arrow_back</span>
</button>
</div>
<h1 class="font-headline-md text-[18px] font-bold text-[#1A1A2E] absolute left-1/2 -translate-x-1/2">Settings</h1>
<div class="w-11"></div> <!-- Spacer for visual balance -->
</header>
<main class="pt-14 pb-20 overflow-y-auto">
<!-- User Profile Card -->

<!-- Section Label -->
<div class="px-margin-mobile mb-2 mt-space-xl">
<h2 class="text-[#6B7280] text-[12px] font-semibold uppercase tracking-wider">Preferences</h2>
</div>
<!-- Settings Group -->
<section class="px-margin-mobile">
<div class="bg-white border border-[#E0E0E0] rounded-[12px] overflow-hidden">
<!-- Row 1: Language -->
<button class="w-full flex items-center justify-between h-[56px] px-4 hover:bg-surface-container-low transition-colors active:bg-surface-container">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#2563EB]" style="font-size: 20px;">public</span>
<span class="text-[#1A1A2E] text-[15px] font-medium">Language</span>
</div>
<div class="flex items-center gap-2">
<span class="text-[#6B7280] text-[13px]">English</span>
<span class="material-symbols-outlined text-[#6B7280]" style="font-size: 18px;">chevron_right</span>
</div>
</button>
<div class="h-[1px] bg-[#F3F4F6] mx-4"></div>
<!-- Row 2: Share App -->
<button class="w-full flex items-center justify-between h-[56px] px-4 hover:bg-surface-container-low transition-colors active:bg-surface-container">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#2563EB]" style="font-size: 20px;">share</span>
<span class="text-[#1A1A2E] text-[15px] font-medium">Share App</span>
</div>
<span class="material-symbols-outlined text-[#6B7280]" style="font-size: 18px;">chevron_right</span>
</button>
<div class="h-[1px] bg-[#F3F4F6] mx-4"></div>
<!-- Row 3: Privacy Policy -->
<button class="w-full flex items-center justify-between h-[56px] px-4 hover:bg-surface-container-low transition-colors active:bg-surface-container">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#2563EB]" style="font-size: 20px;">shield</span>
<span class="text-[#1A1A2E] text-[15px] font-medium">Privacy Policy</span>
</div>
<span class="material-symbols-outlined text-[#6B7280]" style="font-size: 18px;">chevron_right</span>
</button>
<div class="h-[1px] bg-[#F3F4F6] mx-4"></div>
<!-- Row 4: Terms & Conditions -->
<button class="w-full flex items-center justify-between h-[56px] px-4 hover:bg-surface-container-low transition-colors active:bg-surface-container">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#2563EB]" style="font-size: 20px;">description</span>
<span class="text-[#1A1A2E] text-[15px] font-medium">Terms &amp; Conditions</span>
</div>
<span class="material-symbols-outlined text-[#6B7280]" style="font-size: 18px;">chevron_right</span>
</button>
</div>
</section>
<!-- App Version Information -->
<section class="mt-space-xl flex flex-col items-center">
<div class="w-9 h-9 mb-4">
<img alt="GeoSnap Logo" class="w-full h-full object-contain" src="https://lh3.googleusercontent.com/aida/AP1WRLutEOiQLIBHXJxitZJ41TPK0E3DE951uNFkeSC1SKV8pew9KCFqR9DpxU634cdSxBRqCJF7WIwRINq4DYvJyxmtvj6LBPQuRLEamn7uren7DSd-0eL0lM7RJIZeBSOyMfD4aWazaLv9ELTAskkoJ_PEhEyipLI1Tye4clNEDsyqyAMDjLzISDlXldhXIOKSeOH_k447F-GkeitGw8dElCeW3SqiFGV83wG4MD6NMvwWrO3WRmC5LX-Jy31E">
</div>
<p class="text-[#1A1A2E] text-[14px] font-medium">GeoSnap</p>
<p class="text-[#9CA3AF] text-[12px] mt-1">Version 1.0.0</p>
</section>
</main>
<!-- Bottom Navigation Bar - Using BottomNavBar Anchor -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 bg-white border-t border-[#F3F4F6]">
<a class="flex flex-col items-center justify-center text-[#6B7280] transition-transform active:scale-90" href="#">
<span class="material-symbols-outlined" style="font-size: 24px;">photo_camera</span>
<span class="text-[10px] font-semibold mt-1 uppercase tracking-tight">Camera</span>
</a>
<a class="flex flex-col items-center justify-center text-[#6B7280] transition-transform active:scale-90" href="#">
<span class="material-symbols-outlined" style="font-size: 24px;">grid_view</span>
<span class="text-[10px] font-semibold mt-1 uppercase tracking-tight">Collection</span>
</a>
<a class="flex flex-col items-center justify-center text-[#6B7280] transition-transform active:scale-90" href="#">
<span class="material-symbols-outlined" style="font-size: 24px;">assessment</span>
<span class="text-[10px] font-semibold mt-1 uppercase tracking-tight">Reporting</span>
</a>
<a class="flex flex-col items-center justify-center text-[#2563EB] transition-transform active:scale-90" href="#">
<span class="material-symbols-outlined" style="font-size: 24px;">description</span>
<span class="text-[10px] font-semibold mt-1 uppercase tracking-tight">Templates</span>
</a>
</nav>
<script>
        // Simple micro-interaction for rows
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('touchstart', function() {
                this.classList.add('opacity-70');
            });
            button.addEventListener('touchend', function() {
                this.classList.remove('opacity-70');
            });
        });
    </script>


</body></html>
