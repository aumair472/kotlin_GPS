<style>

            -webkit-tap-highlight-color: transparent;
        }
        .viewfinder-bracket {
            position: absolute;
            width: 24px;
            height: 24px;
            border-color: rgba(255, 255, 255, 0.8);
        }
        .bracket-tl { top: 120px; left: 32px; border-top-width: 1px; border-left-width: 1px; }
        .bracket-tr { top: 120px; right: 32px; border-top-width: 1px; border-right-width: 1px; }
        .bracket-bl { bottom: 280px; left: 32px; border-bottom-width: 1px; border-left-width: 1px; }
        .bracket-br { bottom: 280px; right: 32px; border-bottom-width: 1px; border-right-width: 1px; }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="flex flex-col h-screen font-body-sm">

<div class="flex items-center gap-2">

<span class="font-mono-data text-white text-[12px]">28.4567° N, 67.1234° E</span>
</div>
<h1 class="font-headline-md text-headline-md font-bold text-white tracking-tight">GeoSnap</h1>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-white">settings</span>
</button>
</header>
<!-- Main Viewfinder Area -->
<main class="relative flex-1 w-full bg-[#1C1C1E]">

<!-- Center Crosshair -->

<div class="relative w-6 h-6">
<div class="absolute top-1/2 left-0 w-full h-[1px] bg-white/60"></div>
<div class="absolute top-0 left-1/2 h-full w-[1px] bg-white/60"></div>
</div>
</div>
<!-- Timestamp Pill Overlay -->
<div class="absolute left-0 right-0 z-40 bottom-[240px]">
<div class="bg-black/50 backdrop-blur-md flex items-center justify-center gap-4 border-y border-white/10 py-4 w-full"><span class="material-symbols-outlined text-white text-[24px]" style="font-variation-settings: &quot;FILL&quot; 1;">location_on</span><div class="flex flex-col"><span class="font-mono-data text-white text-[14px] leading-tight">Thu, 21 Nov 2024 | 14:32:05 PKT</span><span class="font-mono-data text-blue-300 text-[12px] leading-tight font-semibold">28.4567° N, 67.1234° E | Alt: 342m</span></div></div>
</div>

</button>
</div>
</div>
<script>
        // Simple micro-interaction for the shutter button
        const shutter = document.querySelector('.shutter-btn');
        shutter.addEventListener('click', () => {
            // Flash effect simulator
            const flash = document.createElement('div');
            flash.className = 'fixed inset-0 bg-white z-[100] opacity-0 transition-opacity duration-75 pointer-events-none';
            document.body.appendChild(flash);
            
            requestAnimationFrame(() => {
                flash.style.opacity = '1';
                setTimeout(() => {
                    flash.style.opacity = '0';
                    setTimeout(() => flash.remove(), 75);
                }, 50);
            });
            
            // Haptic feedback simulation
            if (window.navigator.vibrate) {
                window.navigator.vibrate(20);
            }
        });

        // Update coordinates and time (Atmospheric effect)
        function updateStatus() {
            const timeEl = document.querySelector('.font-mono-data.text-white.text-\\[12px\\].leading-tight');
            if (timeEl) {
                const now = new Date();
                const options = { weekday: 'short', day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false, timeZoneName: 'short' };
                timeEl.innerText = now.toLocaleString('en-GB', options).replace(/,/g, ' |');
            }
        }
        setInterval(updateStatus, 1000);
    </script>
